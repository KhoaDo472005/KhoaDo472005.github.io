<!DOCTYPE html>
<html lang="vi" data-theme="night">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Player</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── Galaxy Night (dark) ── */
[data-theme="night"] {
  --bg:        #010417;
  --bg2:       #040d28;
  --surface:   #080f2e;
  --border:    #1a2245;
  --text:      #E0E6ED;
  --muted:     #AAB2BD;
  --c1:        #8E91E0;
  --c2:        #75A2DD;
  --c3:        #F694C9;
  --c4:        #F3D688;
  --c5:        #4CAAD0;
  --c6:        #AEEBFF;
  --c7:        #897EE6;
  --c8:        #D68CC9;
  --accent:    #8E91E0;
  --accent2:   #4CAAD0;
  --glow:      rgba(142,145,224,0.25);
  --vinyl-bg:  #040d28;
  --vinyl-ring:#0d1d4a;
  --shadow:    0 24px 64px rgba(0,0,0,0.6);
}

/* ── Galaxy Dawn (light) ── */
[data-theme="dawn"] {
  --bg:        #DCE6F0;
  --bg2:       #cdd9e8;
  --surface:   #e8f0f8;
  --border:    #bfcedd;
  --text:      #3A3F4A;
  --muted:     #6C7380;
  --c1:        #A3A6F0;
  --c2:        #8BB5E8;
  --c3:        #F8A6D4;
  --c4:        #F6E29D;
  --c5:        #6BC0E4;
  --c6:        #6ADABD;
  --c7:        #A49AF0;
  --c8:        #E5A0D7;
  --accent:    #A3A6F0;
  --accent2:   #6BC0E4;
  --glow:      rgba(163,166,240,0.2);
  --vinyl-bg:  #cdd9e8;
  --vinyl-ring:#bfcedd;
  --shadow:    0 24px 64px rgba(100,120,160,0.2);
}

html, body {
  height: 100%;
  font-family: 'Quicksand', sans-serif;
  background: var(--bg);
  color: var(--text);
  transition: background 0.4s, color 0.4s;
}

/* ══ LAYOUT ══ */
.app {
  display: grid;
  /* Desktop: player kiri, queue kanan */
  grid-template-columns: 380px 1fr;
  grid-template-rows: 100vh;
  height: 100vh;
}

/* ── Player Panel ── */
#player-panel {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 32px 28px 24px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  position: relative;
}

/* Mesh background */
#player-panel::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 60% 40% at 20% 10%, var(--glow) 0%, transparent 60%),
    radial-gradient(ellipse 50% 35% at 80% 85%, rgba(76,170,208,0.12) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}

#player-panel > * { position: relative; z-index: 1; }

/* Top bar */
.top-bar {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 36px;
}

.app-name {
  font-family: 'Nunito', sans-serif;
  font-weight: 800;
  font-size: 0.85rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--accent);
}

/* Theme toggle */
#theme-btn {
  width: 42px; height: 24px;
  background: var(--border);
  border: none;
  border-radius: 12px;
  cursor: pointer;
  position: relative;
  transition: background 0.3s;
  flex-shrink: 0;
}
#theme-btn::after {
  content: '';
  position: absolute;
  top: 3px; left: 3px;
  width: 18px; height: 18px;
  border-radius: 50%;
  background: var(--accent);
  transition: transform 0.3s, background 0.3s;
}
[data-theme="dawn"] #theme-btn::after { transform: translateX(18px); }

.theme-icon {
  position: absolute;
  top: 50%; transform: translateY(-50%);
  font-size: 10px;
  pointer-events: none;
}
.theme-icon.moon { left: 6px; }
.theme-icon.sun  { right: 5px; }

/* ── Vinyl ── */
.vinyl-wrap {
  position: relative;
  width: 210px; height: 210px;
  margin-bottom: 32px;
  flex-shrink: 0;
}

.vinyl-shadow {
  position: absolute;
  inset: 10px;
  border-radius: 50%;
  background: var(--accent);
  opacity: 0.15;
  filter: blur(24px);
  animation: glowPulse 3s ease-in-out infinite;
}
@keyframes glowPulse { 0%,100%{opacity:0.12} 50%{opacity:0.28} }

.vinyl {
  width: 210px; height: 210px;
  border-radius: 50%;
  position: relative;
  animation: spin 5s linear infinite;
  animation-play-state: paused;
}
.vinyl.spinning { animation-play-state: running; }

.vinyl-disc {
  position: absolute;
  inset: 0;
  border-radius: 50%;
  background: conic-gradient(
    from 0deg,
    var(--vinyl-bg) 0%,
    var(--vinyl-ring) 4%,
    var(--vinyl-bg) 8%,
    var(--vinyl-ring) 12%,
    var(--vinyl-bg) 16%,
    var(--vinyl-ring) 20%,
    var(--vinyl-bg) 24%,
    var(--vinyl-ring) 28%,
    var(--vinyl-bg) 32%,
    var(--vinyl-ring) 36%,
    var(--vinyl-bg) 40%,
    var(--vinyl-ring) 44%,
    var(--vinyl-bg) 48%,
    var(--vinyl-ring) 52%,
    var(--vinyl-bg) 56%,
    var(--vinyl-ring) 60%,
    var(--vinyl-bg) 64%,
    var(--vinyl-ring) 68%,
    var(--vinyl-bg) 72%,
    var(--vinyl-ring) 76%,
    var(--vinyl-bg) 80%,
    var(--vinyl-ring) 84%,
    var(--vinyl-bg) 88%,
    var(--vinyl-ring) 92%,
    var(--vinyl-bg) 96%,
    var(--vinyl-ring) 100%
  );
  box-shadow: var(--shadow);
}

/* Rainbow ring - subtle */
.vinyl-rainbow {
  position: absolute;
  inset: 18px;
  border-radius: 50%;
  background: conic-gradient(
    from 0deg,
    var(--c1), var(--c2), var(--c3), var(--c4),
    var(--c5), var(--c6), var(--c7), var(--c8), var(--c1)
  );
  opacity: 0.25;
}

.vinyl-center {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  width: 64px; height: 64px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, var(--c1) 0%, var(--accent2) 50%, var(--bg2) 70%);
  box-shadow: 0 0 0 3px var(--border), 0 0 0 5px var(--bg2);
  z-index: 2;
}

.vinyl-dot {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--bg2);
  z-index: 3;
}

@keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }

/* ── Track info ── */
.now-playing-label {
  font-size: 0.6rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 6px;
}

#track-title {
  font-family: 'Nunito', sans-serif;
  font-weight: 800;
  font-size: 1.15rem;
  text-align: center;
  line-height: 1.3;
  color: var(--text);
  margin-bottom: 4px;
  max-width: 320px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

#track-pos {
  font-size: 0.7rem;
  color: var(--muted);
  margin-bottom: 24px;
}
#track-pos span { color: var(--accent); font-weight: 700; }

/* ── Progress ── */
.progress-wrap {
  width: 100%;
  margin-bottom: 6px;
  cursor: pointer;
  height: 4px;
  background: var(--border);
  border-radius: 4px;
  position: relative;
  transition: height 0.15s;
}
.progress-wrap:hover { height: 6px; }

#progress-fill {
  height: 100%;
  border-radius: 4px;
  width: 0%;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  transition: width 0.2s linear;
  position: relative;
}
#progress-fill::after {
  content: '';
  position: absolute;
  right: -5px; top: 50%;
  transform: translateY(-50%);
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--accent);
  opacity: 0;
  transition: opacity 0.2s;
}
.progress-wrap:hover #progress-fill::after { opacity: 1; }

.time-row {
  display: flex;
  justify-content: space-between;
  font-size: 0.65rem;
  color: var(--muted);
  width: 100%;
  margin-bottom: 24px;
}

/* ── Controls ── */
.controls {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  margin-bottom: 24px;
  width: 100%;
}

.ctrl-btn {
  background: none;
  border: 1px solid transparent;
  cursor: pointer;
  color: var(--muted);
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
  width: 40px; height: 40px;
  transition: color 0.2s, background 0.2s, transform 0.15s;
}
.ctrl-btn:hover {
  color: var(--text);
  background: var(--border);
  transform: scale(1.08);
}

#btn-play {
  width: 60px; height: 60px;
  border-radius: 50%;
  border: none;
  cursor: pointer;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 0 28px var(--glow);
  transition: transform 0.15s, box-shadow 0.2s;
  margin: 0 10px;
}
#btn-play:hover { transform: scale(1.07); box-shadow: 0 0 40px var(--glow); }
#btn-play:active { transform: scale(0.96); }

/* ── Volume ── */
.vol-row {
  display: flex;
  align-items: center;
  gap: 10px;
  width: 100%;
  margin-bottom: 24px;
}
.vol-row svg { color: var(--muted); flex-shrink: 0; }

#vol-slider {
  flex: 1;
  -webkit-appearance: none;
  height: 3px;
  background: var(--border);
  border-radius: 4px;
  outline: none;
  cursor: pointer;
}
#vol-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 13px; height: 13px;
  border-radius: 50%;
  background: var(--accent);
  cursor: pointer;
  box-shadow: 0 0 6px var(--glow);
}

/* ── Status / Cycle ── */
.status-row {
  width: 100%;
  font-size: 0.62rem;
  color: var(--muted);
  text-align: center;
  padding-top: 16px;
  border-top: 1px solid var(--border);
  line-height: 1.8;
}
.status-row strong { color: var(--c7); }

#status-text {
  width: 100%;
  font-size: 0.62rem;
  color: var(--muted);
  text-align: center;
  margin-top: 6px;
  min-height: 18px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* ══ QUEUE PANEL ══ */
#queue-panel {
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--bg);
}

.queue-header {
  padding: 28px 28px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}
.queue-header h2 {
  font-family: 'Nunito', sans-serif;
  font-weight: 800;
  font-size: 1rem;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--text);
}
.badge {
  background: var(--border);
  color: var(--muted);
  font-size: 0.68rem;
  padding: 2px 10px;
  border-radius: 20px;
  font-family: 'Quicksand', sans-serif;
  font-weight: 600;
}

/* Loading bar */
.loading-bar {
  height: 2px;
  background: transparent;
  flex-shrink: 0;
  overflow: hidden;
}
.loading-bar.active {
  background: var(--border);
}
.loading-bar.active::after {
  content: '';
  display: block;
  height: 100%;
  width: 40%;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  animation: loadSlide 1s linear infinite;
}
@keyframes loadSlide { from{transform:translateX(-100%)} to{transform:translateX(350%)} }

#queue-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px 0;
}
#queue-list::-webkit-scrollbar { width: 4px; }
#queue-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

/* Track items */
.track-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 24px;
  cursor: pointer;
  transition: background 0.15s;
  position: relative;
  border-radius: 0;
}
.track-item:hover { background: var(--surface); }
.track-item.active {
  background: var(--surface);
}
.track-item.active::before {
  content: '';
  position: absolute;
  left: 0; top: 6px; bottom: 6px;
  width: 3px;
  border-radius: 0 3px 3px 0;
  background: linear-gradient(180deg, var(--accent), var(--accent2));
}

.track-num {
  width: 26px;
  text-align: right;
  font-size: 0.7rem;
  color: var(--muted);
  flex-shrink: 0;
  font-weight: 600;
}
.track-item.active .track-num { color: var(--accent); }

/* Animated bars */
.bars { display: none; width: 16px; height: 14px; align-items: flex-end; gap: 2.5px; }
.track-item.active .bars { display: flex; }
.track-item.active .num-val { display: none; }

.bar {
  width: 3px; border-radius: 2px;
  background: linear-gradient(180deg, var(--accent2), var(--accent));
  animation: barBounce 0.7s ease-in-out infinite alternate;
}
.bar:nth-child(1) { height: 5px;  animation-delay: 0s; }
.bar:nth-child(2) { height: 13px; animation-delay: 0.18s; }
.bar:nth-child(3) { height: 8px;  animation-delay: 0.08s; }
@keyframes barBounce { from{transform:scaleY(0.35)} to{transform:scaleY(1)} }
.track-item.paused .bar { animation-play-state: paused; }

/* Color dot */
.color-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

.track-name {
  flex: 1;
  font-size: 0.82rem;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  color: var(--text);
  transition: color 0.2s;
}
.track-item.active .track-name { color: var(--accent); }
.track-item.played .track-name { color: var(--muted); font-weight: 400; }

/* ══ MOBILE ══ */
@media (max-width: 700px) {
  html, body { height: auto; overflow: auto; }

  .app {
    grid-template-columns: 1fr;
    grid-template-rows: auto 1fr;
    height: auto;
    min-height: 100vh;
  }

  #player-panel {
    border-right: none;
    border-bottom: 1px solid var(--border);
    padding: 24px 20px 20px;
  }

  #queue-panel {
    height: 60vh;
    min-height: 300px;
  }

  .vinyl-wrap { width: 170px; height: 170px; }
  .vinyl, .vinyl-disc { width: 170px; height: 170px; }
  .vinyl-shadow { inset: 8px; }
}
</style>
</head>

<div class="app">

  <div id="player-panel">
    <div class="top-bar">

    </div>

      <div class="vinyl" id="vinyl">
        <div class="vinyl-disc"></div>
        <div class="vinyl-rainbow"></div>
        <div class="vinyl-center"></div>
        <div class="vinyl-dot"></div>

    <div class="now-playing-label">Đang phát</div>
    <div id="track-title">—</div>

    <div class="progress-wrap" onclick="seekTo(event)">

    <div class="controls">

        <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
      </button>
      <button id="btn-play" onclick="togglePlay()">
        <svg id="icon-play" width="26" height="26" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        <svg id="icon-pause" width="26" height="26" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
      </button>
      <button class="ctrl-btn" onclick="nextTrack()" title="Tiếp">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6h2v12h-2z"/></svg>
      </button>
    </div>

    <div class="vol-row">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
      <input type="range" id="vol-slider" min="0" max="1" step="0.01" value="0.8" oninput="setVolume(this.value)">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
    </div>

    <div class="status-row">
      Shuffle không lặp &nbsp;•&nbsp;
      Lượt <strong id="cycle-num">1</strong> — đã qua <strong id="played-count">0</strong> bài
    </div>
    <div id="status-text"></div>
  </div>

  <!-- ══ RIGHT / BOTTOM: Queue ══ -->
  <div id="queue-panel">
    <div class="queue-header">
      <h2>Danh sách</h2>
      <span class="badge" id="queue-badge">0 bài</span>
    </div>
    <div class="loading-bar" id="loading-bar"></div>
    <div id="queue-list"></div>
  </div>
</div>

// ═══════════════════════════════════════════════════════════

// Màu dot cho từng bài (xoay vòng theo palette)
const COLORS = ['--c1','--c2','--c3','--c4','--c5','--c6','--c7','--c8'];

const audio = document.getElementById('audio');
let tracks = [], shuffled = [], queuePos = -1;
let cycleCount = 1, playedThisCycle = 0, isPlaying = false;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function init() {
  if (!PLAYLIST.length) {
    setStatus('Chưa có bài — thêm link vào mảng PLAYLIST');
    return;
  }
  tracks = PLAYLIST.map(p => ({ name: p.name, url: p.url }));
  shuffled = shuffle(tracks.map((_, i) => i));
  document.getElementById('queue-badge').textContent = tracks.length + ' bài';
  document.getElementById('total').textContent = tracks.length;
  setStatus('✓ ' + tracks.length + ' bài — nhấn Play để bắt đầu');
  renderQueue();
  updateCycleInfo();
}

function setStatus(msg) { document.getElementById('status-text').textContent = msg; }
function setLoading(on) { document.getElementById('loading-bar').className = 'loading-bar' + (on ? ' active' : ''); }

function playAt(qi) {
  if (qi < 0 || qi >= shuffled.length) return;
  queuePos = qi;
  const t = tracks[shuffled[qi]];
  setLoading(true);
  setStatus('⟳ ' + t.name);
  audio.src = t.url;
  audio.volume = parseFloat(document.getElementById('vol-slider').value);
  audio.load();
  audio.play().then(() => {
    isPlaying = true;
    setPlayIcon(true);
    document.getElementById('vinyl').classList.add('spinning');
    document.getElementById('track-title').textContent = t.name;
    document.getElementById('cur-idx').textContent = qi + 1;
    setLoading(false);
    setStatus('▶ ' + t.name);
    renderQueue();
  }).catch(err => {
    setLoading(false);
    setStatus('✕ Lỗi: ' + t.name);
  });
}

function nextTrack() {
  if (!tracks.length) return;
  let next = queuePos + 1;
  if (next >= shuffled.length) {
    shuffled = shuffle(tracks.map((_, i) => i));
    cycleCount++;
    playedThisCycle = 0;
    next = 0;
  }
  playedThisCycle++;
  updateCycleInfo();
  playAt(next);
}

function prevTrack() {
  if (!tracks.length) return;
  if (audio.currentTime > 3) { audio.currentTime = 0; return; }
  playAt(queuePos <= 0 ? shuffled.length - 1 : queuePos - 1);
}

function togglePlay() {
  if (!tracks.length) return;
  if (queuePos === -1) { nextTrack(); return; }
  if (isPlaying) {
    audio.pause(); isPlaying = false;
    setPlayIcon(false);
    document.getElementById('vinyl').classList.remove('spinning');
    setStatus('⏸ ' + tracks[shuffled[queuePos]].name);
  } else {
    audio.play(); isPlaying = true;
    setPlayIcon(true);
    document.getElementById('vinyl').classList.add('spinning');
    setStatus('▶ ' + tracks[shuffled[queuePos]].name);
  }
  renderQueue();
}

function setPlayIcon(p) {
  document.getElementById('icon-play').style.display = p ? 'none' : '';
  document.getElementById('icon-pause').style.display = p ? '' : 'none';
}

function setVolume(v) { audio.volume = parseFloat(v); }

audio.addEventListener('timeupdate', () => {
  if (!audio.duration) return;
  const pct = (audio.currentTime / audio.duration) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('t-cur').textContent = fmt(audio.currentTime);
  document.getElementById('t-dur').textContent = fmt(audio.duration);
});

audio.addEventListener('ended', nextTrack);
audio.addEventListener('error', () => { setLoading(false); setStatus('✕ Không thể phát — kiểm tra link/quyền chia sẻ'); });

function seekTo(e) {
  if (!audio.duration) return;
  const rect = e.currentTarget.getBoundingClientRect();
  audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
}

function fmt(s) {
  if (!s || isNaN(s)) return '0:00';
  return `${Math.floor(s/60)}:${Math.floor(s%60).toString().padStart(2,'0')}`;
}

function updateCycleInfo() {
  document.getElementById('cycle-num').textContent = cycleCount;
  document.getElementById('played-count').textContent = playedThisCycle;
}

function renderQueue() {
  const list = document.getElementById('queue-list');
  list.innerHTML = '';
  shuffled.forEach((trackIdx, qi) => {
    const t = tracks[trackIdx];
    const colorVar = COLORS[trackIdx % COLORS.length];
    const div = document.createElement('div');
    div.className = 'track-item'
      + (qi === queuePos ? ' active' + (!isPlaying ? ' paused' : '') : '')
      + (qi < queuePos ? ' played' : '');
    div.onclick = () => { playedThisCycle = qi + 1; updateCycleInfo(); playAt(qi); };
    div.innerHTML = `
      <div class="track-num">
        <span class="num-val">${qi + 1}</span>
        <div class="bars"><div class="bar"></div><div class="bar"></div><div class="bar"></div></div>
      </div>
      <div class="color-dot" style="background:var(${colorVar})"></div>
      <div class="track-name" title="${t.name}">${t.name}</div>`;
    list.appendChild(div);
  });
  const active = list.querySelector('.track-item.active');
  if (active) active.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
}

// Theme toggle
function toggleTheme() {
  const html = document.documentElement;
  html.dataset.theme = html.dataset.theme === 'night' ? 'dawn' : 'night';
  localStorage.setItem('galaxy-theme', html.dataset.theme);
}

// Restore saved theme
const saved = localStorage.getItem('galaxy-theme');
if (saved) document.documentElement.dataset.theme = saved;

// Keyboard
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
  if (e.code === 'ArrowRight') nextTrack();
  if (e.code === 'ArrowLeft') prevTrack();
  if (e.code === 'ArrowUp') { const v = Math.min(1, audio.volume+0.05); audio.volume=v; document.getElementById('vol-slider').value=v; }
  if (e.code === 'ArrowDown') { const v = Math.max(0, audio.volume-0.05); audio.volume=v; document.getElementById('vol-slider').value=v; }
});

init();
</script>
